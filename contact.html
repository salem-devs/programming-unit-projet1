<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>contact</title>
    <link rel="stylesheet" href="contact-style.css" />
  </head>
  <body>
    <section class="contact-section" id="contact">
      <div class="contact">
        <!-- Contact -->
        <div class="contact-card">
          <h3>Contactez-nous</h3>

          <p>
            Une question ? Une suggestion ? Un partenariat ? Notre équipe est à
            votre écoute.
          </p>

          <form>
            <div class="input-group">
              <label>Nom complet</label>
              <input type="text" placeholder="Votre nom" />
            </div>

            <div class="input-group">
              <label>Adresse e-mail</label>
              <input type="email" placeholder="Votre e-mail" />
            </div>

            <div class="input-group">
              <label>Téléphone</label>
              <input type="tel" placeholder="+243 ..." />
            </div>

            <div class="input-group">
              <label>Objet</label>
              <input type="text" placeholder="Objet du message" />
            </div>

            <div class="input-group">
              <label>Message</label>
              <textarea
                rows="6"
                placeholder="Écrivez votre message..."
              ></textarea>
            </div>

            <button type="submit">Envoyer le message</button>
          </form>
        </div>
      </div>

      <!-- Informations -->

      <div class="contact-info">
        <div class="info-card">
          <div class="icon">📍</div>

          <h4>Adresse</h4>

          <p>
            123 Avenue de la Santé<br />
            Kinshasa, RDC
          </p>
        </div>

        <div class="info-card">
          <div class="icon">📞</div>

          <h4>Téléphone</h4>

          <p>+243 000 000 000</p>
        </div>

        <div class="info-card">
          <div class="icon">✉️</div>

          <h4>E-mail</h4>

          <p>contact@espoir.org</p>
        </div>
      </div>
    </section>
  </body>
</html>
